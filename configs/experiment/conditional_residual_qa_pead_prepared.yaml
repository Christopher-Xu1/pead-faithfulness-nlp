run_name: conditional_residual_qa_pead
seed: 42
model_config: configs/model/conditional_residual_finbert.yaml
label_config: configs/data/pead_20d.yaml

prepared_inputs:
  call_level_path: outputs/datasets/conditional_residual_qa_pead/call_level_inputs.csv
  pair_level_path: outputs/datasets/conditional_residual_qa_pead/pair_level_inputs.csv

dataset_output_dir: outputs/datasets/conditional_residual_qa_pead
output_dir: outputs/models/conditional_residual_qa_pead
report_path: reports/conditional_residual_qa_pead_report.md

rolling:
  min_train_calls: 400
  val_calls: 64
  test_calls: 64
  step_calls: 64

validation:
  min_total_calls: 1000
  min_total_pairs: 10000
  min_folds: 10
  min_train_pairs_per_fold: 500
  min_eval_pairs_per_fold: 100
  min_feature_coverage:
    SUE_EPS: 0.65
    SUE_REV: 0.85
    pre_event_return: 0.90
    volatility: 0.90
    market_cap: 0.99
    qa_count: 0.99

baseline:
  feature_columns:
    - SUE_EPS
    - SUE_REV
    - pre_event_return
    - volatility
    - market_cap
    - qa_count

conditioning:
  feature_columns:
    - SUE_EPS
    - SUE_REV
    - baseline_pred

aggregation:
  methods:
    - mean
    - max
    - std
    - topk_mean
  top_k: 3

final_prediction:
  method: simple
  simple_residual_column: mean_pair_residual
  meta_feature_columns:
    - baseline_pred
    - mean_pair_residual
    - max_pair_residual
